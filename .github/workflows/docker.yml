name: Backend Tests and Docker Build

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/trend-scout-enterprise-backend
  PIP_INDEX_URL: https://mirrors.cloud.tencent.com/pypi/simple/
  PIP_TRUSTED_HOST: mirrors.cloud.tencent.com

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trend_scout
          POSTGRES_PASSWORD: trend_scout
          POSTGRES_DB: trend_scout
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trend_scout -d trend_scout"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://trend_scout:trend_scout@localhost:5432/trend_scout
      TEST_DATABASE_URL: postgresql+psycopg2://trend_scout:trend_scout@localhost:5432/trend_scout
      SECRET_KEY: ci-test-secret
      ENCRYPTION_SALT: dGVzdC1zYWx0LTEyMzQ1Ng==
      TESTING: "1"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure pip to use Tencent mirror
        run: |
          mkdir -p ~/.config/pip
          printf '[global]\nindex-url = https://pypi.org/simple/\nextra-index-url = https://mirrors.cloud.tencent.com/pypi/simple/\ntrusted-host = mirrors.cloud.tencent.com\n' > ~/.config/pip/pip.conf
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install --no-cache-dir --retries 10 --timeout 120 -e ".[dev]"

      - name: Run backend tests
        run: python -m pytest tests/ -v

      - name: Run backend smoke test
        run: |
          python -m uvicorn trend_scout_enterprise.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          python scripts/smoke_test.py
        # Smoke test exits 0 even if Redis is unavailable; it validates the
        # API surface, workspace routing, and trends aggregation.

  build-and-push:
    needs: test-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          platforms: linux/amd64
          build-args: |
            PIP_INDEX_URL=https://mirrors.cloud.tencent.com/pypi/simple/
            PIP_TRUSTED_HOST=mirrors.cloud.tencent.com
