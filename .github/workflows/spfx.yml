name: Build SPFx Web Part

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-spfx:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spfx-webpart
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'spfx-webpart/package-lock.json'

      - name: Install dependencies
        # Deterministic install from the committed lock file. legacy-peer-deps
        # is required because the SPFx toolchain has loose peer declarations.
        run: npm ci --no-fund --no-audit --no-progress --legacy-peer-deps

      - name: Build SPFx package
        run: |
          npm run build
          npm run package

      - name: Upload .sppkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: trend-scout-spfx-webpart
          path: spfx-webpart/sharepoint/solution/*.sppkg
          if-no-files-found: error
