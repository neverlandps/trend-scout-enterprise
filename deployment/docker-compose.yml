version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trend_scout
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/trend-scout-enterprise-backend:main}
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/trend_scout}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENCRYPTION_SALT=${ENCRYPTION_SALT:-}
      - LLM_DEFAULT_BASE_URL=${LLM_DEFAULT_BASE_URL:-https://api.openai.com/v1}
      - LLM_DEFAULT_MODEL=${LLM_DEFAULT_MODEL:-gpt-4o-mini}
      - OUTPUT_DIR=/data/outputs
    volumes:
      - app_data:/data
    depends_on:
      - postgres
      - redis

  worker:
    image: ${BACKEND_IMAGE:-ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/trend-scout-enterprise-backend:main}
    command: celery -A trend_scout_enterprise.workers.scan_worker worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/trend_scout}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENCRYPTION_SALT=${ENCRYPTION_SALT:-}
      - LLM_DEFAULT_BASE_URL=${LLM_DEFAULT_BASE_URL:-https://api.openai.com/v1}
      - LLM_DEFAULT_MODEL=${LLM_DEFAULT_MODEL:-gpt-4o-mini}
      - OUTPUT_DIR=/data/outputs
    volumes:
      - app_data:/data
    depends_on:
      - postgres
      - redis
      - backend

  beat:
    image: ${BACKEND_IMAGE:-ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/trend-scout-enterprise-backend:main}
    command: celery -A trend_scout_enterprise.workers.beat_scheduler beat --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/trend_scout}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENCRYPTION_SALT=${ENCRYPTION_SALT:-}
      - LLM_DEFAULT_BASE_URL=${LLM_DEFAULT_BASE_URL:-https://api.openai.com/v1}
      - LLM_DEFAULT_MODEL=${LLM_DEFAULT_MODEL:-gpt-4o-mini}
      - OUTPUT_DIR=/data/outputs
    volumes:
      - app_data:/data
    depends_on:
      - postgres
      - redis
      - backend

volumes:
  postgres_data:
  redis_data:
  app_data:
